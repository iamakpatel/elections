<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Election Dashboard</title>

  <!-- Materialize CSS -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- DataLabels -->
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

  <style>
    body {
      background: #121212;
      color: #fff;
    }

    h4 {
      text-align: center;
      margin-top: 20px;
      font-weight: 600;
    }

    .card {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 15px;
    }

    .chart-container {
      height: 65vh;
    }

    /* Dropdown label color */
    .input-field label {
      color: #aaa;
    }

    /* Dropdown text */
    .select-dropdown {
      color: white;
    }

    /* Selected item */
    .dropdown-content li>a {
      color: black;
    }
  </style>
</head>

<body>

<div class="container">
  <h4>Election Results</h4>

  <!-- Filters -->
  <div class="row">

    <div class="input-field col s12 m4">
      <select id="year"></select>
      <label>Year</label>
    </div>

    <div class="input-field col s12 m4">
      <select id="district"></select>
      <label>District</label>
    </div>

    <div class="input-field col s12 m4">
      <select id="constituency"></select>
      <label>Constituency</label>
    </div>

  </div>

  <!-- Chart -->
  <div class="card">
    <div class="chart-container">
      <canvas id="chart"></canvas>
    </div>
  </div>

</div>

<!-- Materialize JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

<script>
Chart.register(ChartDataLabels);

let rawData = [];

fetch("./data.csv")
  .then(res => res.text())
  .then(csv => {
    rawData = csv.split("\n").slice(1).map(row => {
      let cols = row.split(",");
      return {
        year: cols[0],
        district: cols[2],
        constituency: cols[3],
        party: cols[4],
        vote: parseFloat(cols[6])
      };
    }).filter(d => d.year);

    initFilters();

    // init Material dropdown
    var elems = document.querySelectorAll('select');
    M.FormSelect.init(elems);
  });

const year = document.getElementById("year");
const district = document.getElementById("district");
const constituency = document.getElementById("constituency");

function initFilters() {
  let years = [...new Set(rawData.map(d => d.year))];
  let districts = [...new Set(rawData.map(d => d.district))];

  years.forEach(y => year.add(new Option(y, y)));
  districts.forEach(d => district.add(new Option(d, d)));

  updateConstituency();
}

year.onchange = updateConstituency;
district.onchange = updateConstituency;
constituency.onchange = drawChart;

function updateConstituency() {
  constituency.innerHTML = "";

  let filtered = rawData.filter(d =>
    d.year === year.value &&
    d.district === district.value
  );

  let consts = [...new Set(filtered.map(d => d.constituency))];

  consts.forEach(c => constituency.add(new Option(c, c)));

  // re-init dropdown after update
  M.FormSelect.init(document.querySelectorAll('select'));

  drawChart();
}

let chart;

function drawChart() {
  let filtered = rawData.filter(d =>
    d.year === year.value &&
    d.district === district.value &&
    d.constituency === constituency.value
  );

  let labels = filtered.map(d => d.party);
  let data = filtered.map(d => d.vote);

  let colors = {
    "TMC": "#26a69a",
    "BJP": "#ff9800",
    "CPI(M)": "#ef5350",
    "INC": "#42a5f5"
  };

  let bg = labels.map(l => colors[l] || "#888");

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "pie",
    data: {
      labels: labels,
      datasets: [{
        data: data,
        backgroundColor: bg
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,

      plugins: {
        legend: {
          labels: {
            color: "#fff"
          }
        },

        datalabels: {
          color: "#fff",
          font: {
            weight: "bold",
            size: 14
          },
          formatter: (value, ctx) => {
            let label = ctx.chart.data.labels[ctx.dataIndex];
            return label + "\n" + value + "%";
          }
        }
      }
    }
  });
}
</script>

</body>
</html>
