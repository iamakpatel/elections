<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Election Dashboard</title>

  <!-- Materialize CSS -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- DataLabels -->
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

  <style>
    body {
      background: #121212;
      color: #fff;
    }

    h4 {
      text-align: center;
      margin-top: 20px;
    }

    .card {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 15px;
    }

    .chart-container {
      height: 60vh;
    }

    #candidateList {
      list-style: none;
      padding: 0;
    }

    #candidateList li {
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      background: #2a2a2a;
    }

    .winner {
      border-left: 5px solid #4caf50;
      background: #1b5e20;
    }

    .badge-winner {
      background: gold;
      color: black;
      padding: 2px 6px;
      border-radius: 5px;
      margin-left: 6px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<div class="container">
  <h4>Election Results</h4>

  <!-- Filters -->
  <div class="row">
    <div class="input-field col s12 m4">
      <select id="year"></select>
      <label>Year</label>
    </div>

    <div class="input-field col s12 m4">
      <select id="district"></select>
      <label>District</label>
    </div>

    <div class="input-field col s12 m4">
      <select id="constituency"></select>
      <label>Constituency</label>
    </div>
  </div>

  <!-- Layout -->
  <div class="row">

    <!-- LEFT: Candidates -->
    <div class="col s12 m4">
      <div class="card">
        <h6 style="text-align:center;">Candidates</h6>
        <ul id="candidateList"></ul>
      </div>
    </div>

    <!-- RIGHT: Chart -->
    <div class="col s12 m8">
      <div class="card chart-container">
        <canvas id="chart"></canvas>
      </div>
    </div>

  </div>
</div>

<!-- Materialize -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

<script>
Chart.register(ChartDataLabels);

let rawData = [];

fetch("./data.csv")
  .then(res => res.text())
  .then(csv => {
    rawData = csv.split("\n").slice(1).map(row => {
      let cols = row.split(",");
      return {
        year: cols[0],
        district: cols[2],
        constituency: cols[3],
        party: cols[4],
        candidate: cols[5],
        vote: parseFloat(cols[6])
      };
    }).filter(d => d.year);

    initFilters();

    M.FormSelect.init(document.querySelectorAll('select'));
  });

const year = document.getElementById("year");
const district = document.getElementById("district");
const constituency = document.getElementById("constituency");

function initFilters() {
  let years = [...new Set(rawData.map(d => d.year))];
  let districts = [...new Set(rawData.map(d => d.district))];

  years.forEach(y => year.add(new Option(y, y)));
  districts.forEach(d => district.add(new Option(d, d)));

  updateConstituency();
}

year.onchange = updateConstituency;
district.onchange = updateConstituency;
constituency.onchange = drawChart;

function updateConstituency() {
  constituency.innerHTML = "";

  let filtered = rawData.filter(d =>
    d.year === year.value &&
    d.district === district.value
  );

  let consts = [...new Set(filtered.map(d => d.constituency))];

  consts.forEach(c => constituency.add(new Option(c, c)));

  M.FormSelect.init(document.querySelectorAll('select'));

  drawChart();
}

let chart;

function drawChart() {
  let filtered = rawData.filter(d =>
    d.year === year.value &&
    d.district === district.value &&
    d.constituency === constituency.value
  );

  let labels = filtered.map(d => d.party);
  let data = filtered.map(d => d.vote);

  // Find winner
  let maxVote = Math.max(...data);

  // Update candidate list
  let list = document.getElementById("candidateList");
  list.innerHTML = "";

  filtered.forEach(d => {
    let li = document.createElement("li");

    if (d.vote === maxVote) {
      li.classList.add("winner");
      li.innerHTML = `<b>${d.party}</b>: ${d.candidate}
        <span class="badge-winner">🏆 Winner</span><br>
        Vote: ${d.vote}%`;
    } else {
      li.innerHTML = `<b>${d.party}</b>: ${d.candidate}<br>
        Vote: ${d.vote}%`;
    }

    list.appendChild(li);
  });

  let colors = {
    "TMC": "#26a69a",
    "BJP": "#ff9800",
    "CPI(M)": "#ef5350",
    "INC": "#42a5f5"
  };

  let bg = labels.map(l => colors[l] || "#888");

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "pie",
    data: {
      labels: labels,
      datasets: [{
        data: data,
        backgroundColor: bg
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,

      plugins: {
        legend: {
          position: "right",
          labels: { color: "#fff" }
        },

        datalabels: {
          color: "#fff",
          font: { weight: "bold", size: 14 },
          formatter: (value, ctx) => {
            let label = ctx.chart.data.labels[ctx.dataIndex];
            return label + "\n" + value + "%";
          }
        }
      }
    }
  });
}
</script>

</body>
</html>
