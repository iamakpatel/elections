<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Election Results</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h2 {
      margin-top: 10px;
    }

    .filters {
      margin: 10px;
    }

    select {
      padding: 5px;
      margin: 5px;
    }

    .chart-container {
      width: 100%;
      max-width: 600px;
      height: 60vh;
      margin: auto;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>

<body>

<h2>Election Results</h2>

<div class="filters">
  <select id="year"></select>
  <select id="district"></select>
  <select id="constituency"></select>
</div>

<div class="chart-container">
  <canvas id="chart"></canvas>
</div>

<script>
let rawData = [];

fetch("e.csv")
  .then(res => res.text())
  .then(csv => {
    rawData = csv.split("\n").slice(1).map(row => {
      let cols = row.split(",");
      return {
        year: cols[0],
        district: cols[2],
        constituency: cols[3],
        party: cols[4],
        vote: parseFloat(cols[6])
      };
    }).filter(d => d.year); // remove empty rows

    initFilters();
  });

const year = document.getElementById("year");
const district = document.getElementById("district");
const constituency = document.getElementById("constituency");

function initFilters() {
  let years = [...new Set(rawData.map(d => d.year))];
  let districts = [...new Set(rawData.map(d => d.district))];

  years.forEach(y => year.add(new Option(y, y)));
  districts.forEach(d => district.add(new Option(d, d)));

  updateConstituency();
}

year.onchange = updateConstituency;
district.onchange = updateConstituency;
constituency.onchange = drawChart;

function updateConstituency() {
  constituency.innerHTML = "";

  let filtered = rawData.filter(d =>
    d.year === year.value &&
    d.district === district.value
  );

  let consts = [...new Set(filtered.map(d => d.constituency))];

  consts.forEach(c => constituency.add(new Option(c, c)));

  drawChart();
}

let chart;

function drawChart() {
  let filtered = rawData.filter(d =>
    d.year === year.value &&
    d.district === district.value &&
    d.constituency === constituency.value
  );

  let labels = filtered.map(d => d.party);
  let data = filtered.map(d => d.vote);

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "pie",
    data: {
      labels: labels,
      datasets: [{
        data: data
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false
    }
  });
}
</script>

</body>
</html>
